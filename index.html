<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MurkyTime</title>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22MurkyTime%22,%22short_name%22:%22Murky%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0a0a%22,%22theme_color%22:%22%230a0a0a%22}">

    <style>
        :root {
            --morning: #fff9c4;
            --afternoon: #ffc107;
            --evening: #ff5252;
            --night: #3f51b5;
            --bg-dark: #0a0a0a;
            --watch-color: var(--morning);
        }
        body { 
            background: var(--bg-dark);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .dashboard { 
            text-align: center; padding: 30px; border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.05); width: 340px;
            background: rgba(255,255,255,0.01);
        }
        
        /* TURN CIRCLE */
        .stamina-container { position: relative; width: 140px; height: 140px; margin: 0 auto 30px; }
        .stamina-svg { transform: rotate(-90deg); filter: drop-shadow(0 0 8px var(--watch-color)); }
        circle { fill: none; stroke-width: 10; cx: 70; cy: 70; r: 60; }
        .stamina-bg { stroke: rgba(255,255,255,0.1); } /* Muted unfilled circle */
        .stamina-fill { 
            stroke: var(--watch-color); 
            stroke-dasharray: 377; 
            stroke-dashoffset: 377;
            stroke-linecap: round;
            transition: stroke 0.8s ease, stroke-dashoffset 1s linear;
        }
        .turn-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.2rem; font-weight: bold; color: var(--watch-color);
        }

        /* WATCH SEGMENTS */
        .watch-title { font-size: 1.4rem; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; color: var(--watch-color); }
        .segment-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; margin-bottom: 8px; }
        
        .seg { 
            height: 14px; 
            background: rgba(255, 255, 255, 0.05); /* Unfilled background */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Muted outline */
            border-radius: 2px; 
            transition: all 0.4s ease; 
        }

        /* The Filled State */
        .seg.active { 
            background: var(--watch-color); 
            border-color: var(--watch-color);
            box-shadow: 0 0 10px var(--watch-color); 
        }

        /* The "Current" Segment pulsing (Optional flavor) */
        .seg.current {
            border-color: var(--watch-color);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 5px var(--watch-color);
        }

        .day-progress-container { width: 100%; height: 2px; background: #1a1a1a; border-radius: 2px; margin-top: 30px; }
        #day-bar { height: 100%; width: 0%; background: white; opacity: 0.2; }
        .time-readout { font-family: monospace; font-size: 0.75rem; opacity: 0.3; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div id="watch-label" class="watch-title">WATCH</div>

        <div class="stamina-container">
            <svg class="stamina-svg" width="140" height="140">
                <circle class="stamina-bg"></circle>
                <circle id="stamina-circle" class="stamina-fill"></circle>
            </svg>
            <div id="turn-label" class="turn-text">T-1</div>
        </div>

        <div class="segment-grid" id="row-1"></div>
        <div class="segment-grid" id="row-2"></div>

        <div class="day-progress-container">
            <div id="day-bar"></div>
        </div>
        <div id="clock" class="time-readout">00:00:00</div>
    </div>

    <script>
        const root = document.documentElement;
        const watchNames = ["Night Watch", "Morning Watch", "Afternoon Watch", "Evening Watch"];
        const watchColorKeys = ["night", "morning", "afternoon", "evening"];
        
        // Generate 18 empty placeholders
        const r1 = document.getElementById('row-1');
        const r2 = document.getElementById('row-2');
        for(let i=0; i<18; i++) {
            const d = document.createElement('div');
            d.className = 'seg';
            (i < 9 ? r1 : r2).appendChild(d);
        }

        function update() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();

            const watchIdx = Math.floor(h / 6);
            const minsIntoWatch = ((h % 6) * 60) + m;
            const turnNum = Math.floor(minsIntoWatch / 10) + 1; 

            // Update Theme Color
            const colorValue = `var(--${watchColorKeys[watchIdx]})`;
            root.style.setProperty('--watch-color', colorValue);

            // Turn Circle Progress
            const secsIntoTurn = (m % 10) * 60 + s;
            const turnPercent = secsIntoTurn / 600;
            document.getElementById('stamina-circle').style.strokeDashoffset = 377 - (377 * turnPercent);

            // Labels
            document.getElementById('watch-label').innerText = watchNames[watchIdx];
            document.getElementById('turn-label').innerText = "T-" + turnNum;
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.title = `T-${turnNum} | ${watchNames[watchIdx].split(' ')[0]}`;

            // --- SEGMENT LOGIC FIX ---
            const segments = document.querySelectorAll('.seg');
            segments.forEach((seg, i) => {
                const segmentIndex = i + 1; // 1 to 18
                
                if (segmentIndex < turnNum) {
                    // Fully completed turns
                    seg.className = 'seg active';
                } else if (segmentIndex === turnNum) {
                    // The turn you are currently in
                    seg.className = 'seg current';
                } else {
                    // Future turns in this watch
                    seg.className = 'seg';
                }
            });

            // Day Bar
            const totalSecs = (h * 3600) + (m * 60) + s;
            document.getElementById('day-bar').style.width = (totalSecs / 86400 * 100) + "%";
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
