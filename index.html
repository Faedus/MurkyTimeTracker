<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MurkyTime Tracker</title>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22MurkyTime%22,%22short_name%22:%22Murky%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0a0a%22,%22theme_color%22:%22%230a0a0a%22}">

    <style>
        :root {
            /* Watch Colors based on Pamphlet Cycles */
            --morning: #fff9c4;   /* 06:00 - 12:00 */
            --afternoon: #ffc107; /* 12:00 - 18:00 */
            --evening: #ff5252;   /* 18:00 - 00:00 */
            --night: #3f51b5;     /* 00:00 - 06:00 */
            --bg-dark: #0a0a0a;
            --watch-color: var(--morning);
        }

        body { 
            background: var(--bg-dark);
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            -webkit-app-region: drag; /* Allows moving the window via the background */
        }

        .dashboard { 
            text-align: center; 
            padding: 25px; 
            border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.05); 
            width: 320px;
            background: rgba(255,255,255,0.01);
            user-select: none;
            position: relative;
            transition: border 0.5s ease;
        }

        /* SCREEN SHAKE ANIMATION */
        .shake {
            animation: shake-kf 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake-kf {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* ENCOUNTER ALERT */
        #encounter-alert {
            font-size: 0.7rem; 
            font-weight: bold; 
            letter-spacing: 2px;
            margin-bottom: 10px; 
            height: 14px; 
            transition: opacity 0.5s;
            color: var(--watch-color); 
            opacity: 0;
        }

        /* TURN CIRCLE (10 Minutes) */
        .stamina-container { 
            position: relative; 
            width: 140px; 
            height: 140px; 
            margin: 0 auto 25px; 
            -webkit-app-region: no-drag; 
        }

        .stamina-svg { 
            transform: rotate(-90deg); 
            filter: drop-shadow(0 0 8px var(--watch-color)); 
        }

        circle { fill: none; stroke-width: 10; cx: 70; cy: 70; r: 60; }
        .stamina-bg { stroke: rgba(255,255,255,0.1); }
        
        .stamina-fill { 
            stroke: var(--watch-color); 
            stroke-dasharray: 377; 
            stroke-dashoffset: 377;
            stroke-linecap: round;
            transition: stroke 0.8s ease, stroke-dashoffset 1s linear;
        }

        .turn-text { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--watch-color);
        }

        /* WATCH TITLES & GRID */
        .watch-title { 
            font-size: 1.3rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            color: var(--watch-color); 
            letter-spacing: 1px;
        }

        .segment-grid { 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            gap: 6px; 
            margin-bottom: 8px; 
        }
        
        .seg { 
            height: 12px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px; 
            transition: all 0.4s ease; 
        }

        .seg.active { 
            background: var(--watch-color); 
            border-color: var(--watch-color);
            box-shadow: 0 0 8px var(--watch-color); 
        }

        .seg.current {
            border-color: var(--watch-color);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 5px var(--watch-color);
        }

        /* GLOBAL PROGRESS */
        .day-progress-container { 
            width: 100%; 
            height: 2px; 
            background: #1a1a1a; 
            border-radius: 2px; 
            margin-top: 25px; 
        }

        #day-bar { 
            height: 100%; 
            width: 0%; 
            background: white; 
            opacity: 0.2; 
            transition: width 1s linear;
        }

        .time-readout { 
            font-family: monospace; 
            font-size: 0.75rem; 
            opacity: 0.3; 
            margin-top: 8px; 
        }
    </style>
</head>
<body>

    <div class="dashboard" id="main-panel">
        <div id="encounter-alert">ENCOUNTER CHECK</div>
        <div id="watch-label" class="watch-title">WATCH</div>

        <div class="stamina-container">
            <svg class="stamina-svg" width="140" height="140">
                <circle class="stamina-bg"></circle>
                <circle id="stamina-circle" class="stamina-fill"></circle>
            </svg>
            <div id="turn-label" class="turn-text">T-1</div>
        </div>

        <div class="segment-grid" id="row-1"></div>
        <div class="segment-grid" id="row-2"></div>

        <div class="day-progress-container">
            <div id="day-bar"></div>
        </div>
        <div id="clock" class="time-readout">00:00:00</div>
    </div>

    <script>
        const root = document.documentElement;
        const panel = document.getElementById('main-panel');
        const watchNames = ["Night Watch", "Morning Watch", "Afternoon Watch", "Evening Watch"];
        const watchColorKeys = ["night", "morning", "afternoon", "evening"];
        
        let lastEncounterTurn = -1;

        // Initialize 18 segments
        const r1 = document.getElementById('row-1');
        const r2 = document.getElementById('row-2');
        for(let i=0; i<18; i++) {
            const d = document.createElement('div');
            d.className = 'seg';
            (i < 9 ? r1 : r2).appendChild(d);
        }

        function triggerShake() {
            panel.classList.remove('shake');
            void panel.offsetWidth; // Force reflow to restart animation
            panel.classList.add('shake');
        }

        function update() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();

            // 1. WATCH Logic (6 hours per Watch)
            const watchIdx = Math.floor(h / 6);
            
            // 2. TURN Logic (1-36 per Watch)
            const minsIntoWatch = ((h % 6) * 60) + m;
            const turnNum = Math.floor(minsIntoWatch / 10) + 1; 

            // 3. UI Colors & Labels
            root.style.setProperty('--watch-color', `var(--${watchColorKeys[watchIdx]})`);
            document.getElementById('watch-label').innerText = watchNames[watchIdx];
            document.getElementById('turn-label').innerText = "T-" + turnNum;
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour12: false});

            // 4. ENCOUNTER CHECK (Every 3 Turns / 30 Minutes)
            const alert = document.getElementById('encounter-alert');
            const isEncounterMinute = (m % 30 === 0);
            
            alert.style.opacity = isEncounterMinute ? "1" : "0";

            // Trigger shake once at the start of the encounter minute
            if (isEncounterMinute && lastEncounterTurn !== turnNum) {
                triggerShake();
                lastEncounterTurn = turnNum;
            }

            // 5. STAMINA CIRCLE (Progress of current 10-min turn)
            const secsIntoTurn = (m % 10) * 60 + s;
            const turnPercent = secsIntoTurn / 600;
            document.getElementById('stamina-circle').style.strokeDashoffset = 377 - (377 * turnPercent);

            // 6. PROGRESS SEGMENTS (20 mins each)
            const segments = document.querySelectorAll('.seg');
            const currentSegIndex = Math.floor(minsIntoWatch / 20);

            segments.forEach((seg, i) => {
                if (i < currentSegIndex) {
                    seg.className = 'seg active';
                } else if (i === currentSegIndex) {
                    seg.className = 'seg current';
                } else {
                    seg.className = 'seg';
                }
            });

            // 7. GLOBAL DAY PROGRESS
            const totalSecs = (h * 3600) + (m * 60) + s;
            document.getElementById('day-bar').style.width = (totalSecs / 86400 * 100) + "%";
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
